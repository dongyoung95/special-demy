<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="'문의 #' + ${inquiry.id} + ' | 특수데미'">문의 상세</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<main class="admin-wrap">
    <p><a th:href="@{/admin/inquiries}">← 목록</a></p>
    <h1 th:text="'문의 #' + ${inquiry.id}">문의</h1>
    <p class="muted" th:if="${saved}">저장되었습니다.</p>

    <section class="section" style="border-top:none;padding-top:1rem;">
        <h2 style="font-size:1.1rem;">문의자</h2>
        <p><strong>이름:</strong> <span th:text="${inquiry.name}">-</span></p>
        <p><strong>전화:</strong> <span id="phoneSpan" th:text="${inquiry.phone} ?: '-'">-</span>
            <button type="button" class="btn btn-ghost" style="padding:0.25rem 0.5rem;font-size:0.85rem;margin-left:0.5rem;"
                    th:if="${inquiry.phone != null}"
                    th:onclick="|navigator.clipboard.writeText(document.getElementById('phoneSpan').innerText)|">복사</button>
        </p>
        <p><strong>이메일:</strong> <span th:text="${inquiry.email} ?: '-'">-</span>
            <a th:if="${inquiry.email != null}" class="btn btn-ghost" style="padding:0.25rem 0.5rem;font-size:0.85rem;margin-left:0.5rem;"
               th:href="|mailto:${inquiry.email}|">메일 답장</a>
        </p>
        <p><strong>선호 답변:</strong> <span th:text="${inquiry.preferredContact.label}">-</span></p>
        <p><strong>희망 과정:</strong> <span th:text="${inquiry.program}">-</span></p>
        <p><strong>접수:</strong>
            <span th:text="${#temporals.format(inquiry.createdAt, 'yyyy-MM-dd HH:mm:ss', T(java.time.ZoneId).of('Asia/Seoul'))}">-</span>
        </p>
        <p><strong>상태:</strong> <span class="badge" th:text="${inquiry.status.labelKo}">-</span></p>
    </section>

    <section class="section">
        <h2 style="font-size:1.1rem;">현재 준비 상태</h2>
        <p class="prose" style="white-space:pre-wrap;" th:text="${inquiry.preparationStatus}">-</p>
        <h2 style="font-size:1.1rem;margin-top:1rem;">문의 내용</h2>
        <p class="prose" style="white-space:pre-wrap;" th:text="${inquiry.message}">-</p>
    </section>

    <section class="section">
        <h2 style="font-size:1.1rem;">처리</h2>
        <form class="form" th:action="@{/admin/inquiries/{id}(id=${inquiry.id})}" method="post" style="max-width:100%;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <label for="status">처리 상태</label>
            <select id="status" name="status" required>
                <option th:each="st : ${inquiryStatuses}"
                        th:value="${st}"
                        th:selected="${st == inquiry.status}"
                        th:text="${st.labelKo}">상태</option>
            </select>
            <label for="adminMemo">관리자 메모</label>
            <textarea id="adminMemo" name="adminMemo" rows="5" th:text="${inquiry.adminMemo}"></textarea>
            <div class="btn-row" style="margin-top:1rem;">
                <button class="btn btn-primary" type="submit">저장</button>
                <a class="btn btn-ghost" th:href="@{/admin/inquiries}">목록</a>
            </div>
        </form>
    </section>

    <form th:action="@{/admin/logout}" method="post" style="margin-top:2rem;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button class="btn btn-ghost" type="submit">로그아웃</button>
    </form>
</main>
</body>
</html>
