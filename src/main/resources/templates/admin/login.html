<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>관리자 로그인 | 특수데미</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<main class="admin-wrap">
    <h1>관리자 로그인</h1>
    <p class="muted" th:if="${param.error}">아이디 또는 비밀번호가 올바르지 않습니다.</p>
    <form class="form" th:action="@{/admin/login}" method="post" style="max-width:360px;margin-top:1rem;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label for="username">아이디</label>
        <input id="username" name="username" type="text" autocomplete="username" required/>
        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required/>
        <div class="btn-row" style="margin-top:1rem;">
            <button class="btn btn-primary" type="submit">로그인</button>
            <a class="btn btn-ghost" th:href="@{/}">사이트 홈</a>
        </div>
    </form>
</main>
</body>
</html>
