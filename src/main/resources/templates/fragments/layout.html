<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="siteHead (pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="theme-color" content="#f5f8fc"/>
    <title th:text="${pageTitle} + ' | 특수데미'">특수데미</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <!-- Pretendard: 스택에만 두면 미적용(맑은 고딕) — CDN으로 실제 로드 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
          crossorigin="anonymous"/>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&amp;display=swap"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css"
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link rel="stylesheet" th:href="@{/css/main.css(v=typ20260508compactpad)}"/>
</head>
<body>
<header class="site-header" th:fragment="siteHeader (active)">
    <div class="wrap nav">
        <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-controls="nav-primary"/>
        <div class="nav-row">
            <div class="nav-head">
                <a class="brand" th:href="@{/}">
                    <img class="brand-mark brand-mark--maritime" th:src="@{/img/brand-anchor-icon.png}" width="28" height="28"
                         alt="" decoding="async" aria-hidden="true"/>
                    <span class="brand-lockup">특수<span>데미</span></span>
                </a>
                <nav class="nav-social" aria-label="특수데미 소셜·카카오 채널 (새 탭)">
                    <ul class="nav-social-list">
                        <li>
                            <a class="nav-social-link nav-social-link--blog" th:href="${links.blogUrl}" target="_blank"
                               rel="noopener noreferrer" aria-label="블로그, 새 탭에서 열림">
                                <i class="fa-solid fa-blog" aria-hidden="true"></i>
                            </a>
                        </li>
                        <li>
                            <a class="nav-social-link nav-social-link--instagram" th:href="${links.instagramUrl}"
                               target="_blank" rel="noopener noreferrer" aria-label="인스타그램, 새 탭에서 열림">
                                <i class="fa-brands fa-instagram" aria-hidden="true"></i>
                            </a>
                        </li>
                        <li>
                            <a class="nav-social-link nav-social-link--youtube" th:href="${links.youtubeUrl}" target="_blank"
                               rel="noopener noreferrer" aria-label="유튜브, 새 탭에서 열림">
                                <i class="fa-brands fa-youtube" aria-hidden="true"></i>
                            </a>
                        </li>
                        <li>
                            <a class="nav-social-link nav-social-link--kakao" th:href="${links.kakaoChannelUrl}" target="_blank"
                               rel="noopener noreferrer" aria-label="카카오톡 채널, 새 탭에서 열림">
                                <span class="nav-social-kakao-icon" aria-hidden="true">
                                    <th:block th:replace="~{fragments/icons :: kakaoTalkIcon(20)}"/>
                                </span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
            <div class="nav-cluster">
                <label for="nav-toggle" class="nav-burger"><span class="nav-burger-icon" aria-hidden="true"></span><span
                        class="nav-burger-text">메뉴</span></label>
            </div>
        </div>
        <nav id="nav-primary" class="nav-links" aria-label="주요 메뉴">
            <a th:href="@{/}" th:classappend="${active == 'home'} ? 'active'">홈</a>
            <a th:href="@{/about}" th:classappend="${active == 'about'} ? 'active'">소개</a>
            <a th:href="@{/instructors}" th:classappend="${active == 'instructors'} ? 'active'">강사 소개</a>
            <a th:href="@{/programs}" th:classappend="${active == 'programs'} ? 'active'">프로그램</a>
            <a th:href="@{/reviews}" th:classappend="${active == 'reviews'} ? 'active'">후기</a>
            <a th:href="@{/contents}" th:classappend="${active == 'contents'} ? 'active'">콘텐츠</a>
            <a th:href="@{/faq}" th:classappend="${active == 'faq'} ? 'active'">FAQ</a>
            <a th:href="@{/contact}" th:classappend="${active == 'contact'} ? 'active'">문의</a>
        </nav>
    </div>
</header>

<footer class="site-footer" th:fragment="siteFooter">
    <div class="wrap">
        <div class="footer-links">
            <a class="footer-social footer-social--blog" th:href="${links.blogUrl}" target="_blank" rel="noopener noreferrer">
                <span class="footer-link-icon" aria-hidden="true"><i class="fa-solid fa-blog"></i></span>
                블로그
            </a>
            <a class="footer-social footer-social--instagram" th:href="${links.instagramUrl}" target="_blank" rel="noopener noreferrer">
                <span class="footer-link-icon" aria-hidden="true"><i class="fa-brands fa-instagram"></i></span>
                인스타그램
            </a>
            <a class="footer-social footer-social--youtube" th:href="${links.youtubeUrl}" target="_blank" rel="noopener noreferrer">
                <span class="footer-link-icon" aria-hidden="true"><i class="fa-brands fa-youtube"></i></span>
                유튜브
            </a>
            <a class="footer-social footer-social--mail" th:href="|mailto:${links.contactEmail}|" target="_blank" rel="noopener noreferrer">
                <span class="footer-link-icon" aria-hidden="true"><i class="fa-solid fa-envelope"></i></span>
                Gmail 문의
            </a>
            <a class="footer-social footer-social--kakao" th:href="${links.kakaoChannelUrl}" target="_blank" rel="noopener noreferrer">
                <span class="footer-link-icon" aria-hidden="true">
                    <th:block th:replace="~{fragments/icons :: kakaoTalkIcon(17)}"/>
                </span>
                카카오톡
            </a>
        </div>
        <p class="muted">특수데미는 체력·수영·멘탈·생활 루틴을 기반으로 한 선발 대비 코칭을 제공합니다. 군사 전술 교육이 아닙니다. 등록은 상담 후 맞을 때만 진행하며, 아무에게나 받지는 않습니다.</p>
        <p class="muted">© 특수데미</p>
    </div>
</footer>
</body>
</html>
